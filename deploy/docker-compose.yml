# Unified runtime topology: Chatwoot (CRM) + Zammad (ticketing) + agent service,
# fronted by a single Caddy reverse proxy. One bridge network, one compose project.
#
# Usage:
#   cp deploy/.env.example deploy/.env   # fill in real secrets/tokens
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d

x-chatwoot-env: &chatwoot-env
  RAILS_ENV: production
  NODE_ENV: production
  INSTALLATION_ENV: docker
  RAILS_LOG_TO_STDOUT: "true"
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  FRONTEND_URL: http://crm.${PUBLIC_IP}.nip.io
  POSTGRES_HOST: postgres
  POSTGRES_USERNAME: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DATABASE: chatwoot
  REDIS_URL: redis://redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  ACTIVE_STORAGE_SERVICE: local
  SMTP_ADDRESS: mailpit
  SMTP_PORT: 1025
  SMTP_AUTHENTICATION: ""
  SMTP_ENABLE_STARTTLS_AUTO: "false"
  MAILER_SENDER_EMAIL: "Chatwoot <noreply@localhost>"
  ENABLE_ACCOUNT_SIGNUP: "false"
  WEB_CONCURRENCY: 1
  RAILS_MAX_THREADS: 5

x-zammad-env: &zammad-env
  POSTGRESQL_HOST: postgres
  POSTGRESQL_PORT: 5432
  POSTGRESQL_DB: zammad
  POSTGRESQL_USER: zammad
  POSTGRESQL_PASS: ${ZAMMAD_DB_PASSWORD}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
  MEMCACHE_SERVERS: memcached:11211
  ELASTICSEARCH_ENABLED: "false"
  TZ: Asia/Jakarta

networks:
  platform:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:
  zammad_storage:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_IP: ${PUBLIC_IP}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - platform
    depends_on:
      - chatwoot-rails
      - zammad-nginx
      - agent
      - mailpit

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    command: postgres -c shared_buffers=512MB
    mem_limit: 1500m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chatwoot
      # Consumed by deploy/postgres/init/01-databases.sh to provision the
      # zammad/agent roles and databases on first init.
      ZAMMAD_DB_PASSWORD: ${ZAMMAD_DB_PASSWORD}
      AGENT_DB_PASSWORD: ${AGENT_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    mem_limit: 300m
    volumes:
      - redis_data:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
    command: memcached -m 64
    mem_limit: 128m
    networks:
      - platform

  chatwoot-rails:
    image: chatwoot/chatwoot:v4.15.1
    restart: unless-stopped
    mem_limit: 2g
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *chatwoot-env
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.15.1
    restart: unless-stopped
    mem_limit: 1500m
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *chatwoot-env
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  zammad-init:
    image: ghcr.io/zammad/zammad:7.2.1
    command: ["zammad-init"]
    restart: on-failure
    environment:
      <<: *zammad-env
    volumes:
      - zammad_storage:/opt/zammad/storage
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy

  zammad-railsserver:
    image: ghcr.io/zammad/zammad:7.2.1
    command: ["zammad-railsserver"]
    restart: unless-stopped
    mem_limit: 2g
    environment:
      <<: *zammad-env
    volumes:
      - zammad_storage:/opt/zammad/storage
    networks:
      - platform
    depends_on:
      zammad-init:
        condition: service_completed_successfully

  zammad-scheduler:
    image: ghcr.io/zammad/zammad:7.2.1
    command: ["zammad-scheduler"]
    restart: unless-stopped
    mem_limit: 1500m
    environment:
      <<: *zammad-env
    volumes:
      - zammad_storage:/opt/zammad/storage
    networks:
      - platform
    depends_on:
      zammad-init:
        condition: service_completed_successfully

  zammad-websocket:
    image: ghcr.io/zammad/zammad:7.2.1
    command: ["zammad-websocket"]
    restart: unless-stopped
    mem_limit: 512m
    environment:
      <<: *zammad-env
    volumes:
      - zammad_storage:/opt/zammad/storage
    networks:
      - platform
    depends_on:
      zammad-init:
        condition: service_completed_successfully

  zammad-nginx:
    image: ghcr.io/zammad/zammad:7.2.1
    command: ["zammad-nginx"]
    restart: unless-stopped
    mem_limit: 256m
    environment:
      <<: *zammad-env
      NGINX_SERVER_SCHEME: http
      ZAMMAD_RAILSSERVER_HOST: zammad-railsserver
      ZAMMAD_WEBSOCKET_HOST: zammad-websocket
    volumes:
      - zammad_storage:/opt/zammad/storage
    networks:
      - platform
    depends_on:
      - zammad-railsserver
      - zammad-websocket

  agent:
    build: ../agent
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - path: .env
        required: false
    environment:
      AGENT_DATABASE_URL: ${AGENT_DATABASE_URL:-postgresql+psycopg://agent:${AGENT_DB_PASSWORD}@postgres:5432/agent}
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - platform
